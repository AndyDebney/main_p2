version: 2

models:
  - name: dim_customers
    description: Customer dimension for analytics and reporting.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_name
      - name: customer_first_name
      - name: customer_last_name

  - name: fct_orders
    description: Order fact table with one row per order.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: store_id
      - name: ordered_at
      - name: ordered_date
      - name: ordered_year
      - name: ordered_month
      - name: subtotal
      - name: tax_paid
      - name: order_total
      - name: tax_rate

  - name: fct_order_items
    description: Order item fact table with one row per order item.
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: store_id
      - name: ordered_at
      - name: ordered_date
      - name: product_sku
      - name: item_quantity
